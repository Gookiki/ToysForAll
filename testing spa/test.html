<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Single File Website</title>
    <link rel="stylesheet" href="style.css"> <!-- Optional external styling -->
</head>
<body>

    <div class="app-layout">

        <!-- Your Always-Present Sidebar -->
        <aside id="menu">
            <a id="link-home" class="sidebar-link active-link" href="#" onclick="showPage('home', event); return false;"><side-thing>Home</side-thing></a>
            <a id="link-donate" class="sidebar-link" href="#" onclick="showPage('donate', event); return false;"><side-thing>Donate</side-thing></a>
            <a id="link-contact" class="sidebar-link" href="#" onclick="showPage('contact', event); return false;"><side-thing>Contact Us</side-thing></a>
        </aside>

        <!-- Page Content Container -->
        <main class="content-area">
            <!-- Section 1: Home Page -->
            <section id="home" class="page active-page">
                <h1>Welcome to the Home Page</h1>
                <p>This is the main landing area of the single-file site.</p>
            </section>

            <!-- page 2: donate Page -->
            <section id="donate" class="page">
                <h1>Donate</h1>
                <p>Support our cause and make a difference in the lives of children.</p>
            </section>

            <!-- Section 3: Contact Page -->
            <section id="contact" class="page">
                <h1>Contact Us</h1>
                <p>This is where you can get in touch with us.</p>
            </section>
        </main>
    </div>

    <script src="script.js"></script> <!-- JavaScript link -->
</body>
</html>
